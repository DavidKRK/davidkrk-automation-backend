<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>🌍 World Digital Clock — All Time Zones</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 1px;
    }

    header p {
      margin-top: 0.4rem;
      color: #8b949e;
      font-size: 0.9rem;
    }

    #count {
      color: #ffa657;
      font-weight: 600;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      width: 100%;
      max-width: 480px;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: #58a6ff;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0.75rem;
      padding: 0.85rem 1rem;
      transition: border-color 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .card .tz-region {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #58a6ff;
      font-weight: 600;
    }

    .card .tz-city {
      font-size: 0.9rem;
      color: #c9d1d9;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card .tz-full {
      font-size: 0.65rem;
      color: #484f58;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card .tz-time {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      color: #ffa657;
      margin-top: 0.2rem;
    }

    .card .tz-offset {
      font-size: 0.7rem;
      color: #8b949e;
    }

    .hidden { display: none !important; }

    footer {
      text-align: center;
      margin-top: 2rem;
      color: #484f58;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🌍 World Digital Clock</h1>
  <p>Displaying <span id="count">…</span> time zones — updated every second</p>
</header>

<div class="search-bar">
  <input type="search" id="filter" placeholder="🔍 Filter by city or region…" autocomplete="off">
</div>

<div id="grid"></div>

<footer>Powered by the ECMAScript Internationalization API (Intl) &mdash; no external dependencies</footer>

  // ---------------------------------------------------------------------------
  // 2. Get supported zones (dynamic API preferred, fallback to static list)
  // ---------------------------------------------------------------------------
  function getTimeZones() {
    try {
      if (typeof Intl.supportedValuesOf === 'function') {
        const zones = Intl.supportedValuesOf('timeZone');
        if (zones && zones.length > 0) return zones;
      }
    } catch (_) { /* ignore */ }
    return STATIC_ZONES;
  }

  // ---------------------------------------------------------------------------
  // 3. Parse a timezone string into { region, city, fullName }
  // ---------------------------------------------------------------------------
  function parseTZ(tz) {
    const parts = tz.split('/');
    const region = parts[0].replace(/_/g, ' ');
    const city   = (parts[parts.length - 1] || tz).replace(/_/g, ' ');
    return { region, city, fullName: tz };
  }

  // ---------------------------------------------------------------------------
  // 4. Get the current UTC offset string for a timezone (e.g. "UTC+2:00")
  // ---------------------------------------------------------------------------
  const _offsetFmt = {};
  function getOffset(tz) {
    if (!_offsetFmt[tz]) {
      try {
        _offsetFmt[tz] = new Intl.DateTimeFormat('en', {
          timeZone: tz,
          timeZoneName: 'shortOffset'
        });
      } catch (_) { return ''; }
    }
    try {
      const parts = _offsetFmt[tz].formatToParts(new Date());
      const off = parts.find(p => p.type === 'timeZoneName');
      return off ? off.value : '';
    } catch (_) { return ''; }
  }

  // ---------------------------------------------------------------------------
  // 5. Format time HH:MM:SS in 24h for a given timezone
  // ---------------------------------------------------------------------------
  const _timeFmt = {};
  function formatTime(tz, date) {
    if (!_timeFmt[tz]) {
      try {
        _timeFmt[tz] = new Intl.DateTimeFormat('en-GB', {
          timeZone: tz,
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false
        });
      } catch (_) { return '--:--:--'; }
    }
    try {
      return _timeFmt[tz].format(date);
    } catch (_) { return '--:--:--'; }
  }

  // ---------------------------------------------------------------------------
  // 6. Build the DOM cards once
  // ---------------------------------------------------------------------------
  const ZONES = getTimeZones();
  const grid  = document.getElementById('grid');
  const countEl = document.getElementById('count');
  countEl.textContent = ZONES.length;

  // Map from tz string → { timeEl, card }
  const timeEls = {};

  ZONES.forEach(tz => {
    const { region, city, fullName } = parseTZ(tz);
    const offset = getOffset(tz);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.search = (region + ' ' + city + ' ' + fullName).toLowerCase();

    card.innerHTML =
      '<div class="tz-region"></div>' +
      '<div class="tz-city"></div>' +
      '<div class="tz-full"></div>' +
      '<div class="tz-time">--:--:--</div>' +
      '<div class="tz-offset"></div>';

    card.querySelector('.tz-region').textContent = region;
    card.querySelector('.tz-city').textContent   = city;
    card.querySelector('.tz-full').textContent   = fullName;
    card.querySelector('.tz-offset').textContent = offset;

    timeEls[tz] = { timeEl: card.querySelector('.tz-time'), card };
    grid.appendChild(card);
  });

  // ---------------------------------------------------------------------------
  // 7. Tick — update all times every second
  // ---------------------------------------------------------------------------
  function tick() {
    const now = new Date();
    ZONES.forEach(tz => {
      const entry = timeEls[tz];
      if (entry && !entry.card.classList.contains('hidden')) {
        entry.timeEl.textContent = formatTime(tz, now);
      }
    });
  }

  tick();
  setInterval(tick, 1000);

  // ---------------------------------------------------------------------------
  // 8. Live search / filter (debounced for performance)
  // ---------------------------------------------------------------------------
  function debounce(fn, ms) {
    let t;
    return function () { clearTimeout(t); t = setTimeout(() => fn.apply(this, arguments), ms); };
  }

  document.getElementById('filter').addEventListener('input', debounce(function () {
    const q = this.value.trim().toLowerCase();
    let visible = 0;
    grid.querySelectorAll('.card').forEach(card => {
      const match = !q || card.dataset.search.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) visible++;
    });
    countEl.textContent = q ? visible + ' / ' + ZONES.length : ZONES.length;
  }, 150));
</script>
